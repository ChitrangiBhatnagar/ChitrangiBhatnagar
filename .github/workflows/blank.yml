name: Auto-update README

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches:
      - main
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Populates the block between
      # <!--START_SECTION:activity--> ... <!--END_SECTION:activity-->
      # with your latest commits, PRs, issues, releases, and stars.
      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_LINES: 5

  update-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Renders your contribution graph as an animated "snake" SVG
      # and pushes it to the `output` branch, which the README embeds.
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ChitrangiBhatnagar
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - name: Push snake output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-waka:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Populates the block between
      # <!--START_SECTION:waka--> ... <!--END_SECTION:waka-->
      # with a weekly coding-time breakdown pulled from WakaTime.
      # Requires a WAKATIME_API_KEY secret (from wakatime.com/settings/api-key)
      # and the WakaTime browser/editor plugin running while you code.
      - name: Update WakaTime stats
        uses: matchai/waka-readme-stats@v3
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: 'true'
          SHOW_PROJECTS: 'true'
