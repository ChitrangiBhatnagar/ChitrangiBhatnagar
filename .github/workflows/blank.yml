name: Auto-update README

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches:
      - main
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Populates the block between
      # <!--START_SECTION:activity--> ... <!--END_SECTION:activity-->
      # with your latest commits, PRs, issues, releases, and stars.
      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_LINES: 5

  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Renders stats + top languages + streak/habits as ONE static SVG,
      # generated by GitHub's own Actions runners instead of the public
      # github-readme-stats.vercel.app instance (which is frequently
      # rate-limited or paused — see anuraghazra/github-readme-stats#4680).
      # Requires a METRICS_TOKEN secret: a classic PAT with
      # `read:user` + `repo` scopes (Settings → Developer settings → PATs).
      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ChitrangiBhatnagar
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 6
          plugin_habits: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
          config_display: large
          config_theme: dark
          # Amber accent override on top of the dark theme
          extras_css: |
            :root {
              --color-title-icon: #E8A33D !important;
              --color-title: #F5EFE6 !important;
              --color-text: #C9A876 !important;
              --color-calendar-graph-day-L4-bg: #E8A33D !important;
              --color-calendar-graph-day-L3-bg: #C08A2E !important;
              --color-calendar-graph-day-L2-bg: #7A5220 !important;
              --color-calendar-graph-day-L1-bg: #4A3418 !important;
            }
          filename: metrics.svg
          committer_message: "chore: update metrics [skip ci]"

  update-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Renders your contribution graph as an animated "snake" SVG
      # and pushes it to the `output` branch, which the README embeds.
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ChitrangiBhatnagar
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=E8A33D&color_dots=241B10,4A3418,7A5220,C08A2E,E8A33D
            dist/github-contribution-grid-snake-dark.svg?color_snake=F5C776&color_dots=1C160F,3A2A18,7A5220,C08A2E,F5C776
      - name: Push snake output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-waka:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Populates the block between
      # <!--START_SECTION:waka--> ... <!--END_SECTION:waka-->
      # with a weekly coding-time breakdown pulled from WakaTime.
      # Requires a WAKATIME_API_KEY secret (from wakatime.com/settings/api-key)
      # and the WakaTime browser/editor plugin running while you code.
      - name: Update WakaTime stats
        uses: matchai/waka-readme-stats@v3
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: 'true'
          SHOW_PROJECTS: 'true'
