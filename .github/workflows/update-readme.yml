name: Auto-update README

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - metrics.svg
  workflow_dispatch:

concurrency:
  group: readme-updates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update recent activity
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_LINES: 5

  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ChitrangiBhatnagar
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 6
          plugin_habits: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
          config_display: large
          config_theme: dark
          extras_css: |
            :root {
              --color-title-icon: #E8A33D !important;
              --color-title: #F5EFE6 !important;
              --color-text: #C9A876 !important;
              --color-calendar-graph-day-L4-bg: #E8A33D !important;
              --color-calendar-graph-day-L3-bg: #C08A2E !important;
              --color-calendar-graph-day-L2-bg: #7A5220 !important;
              --color-calendar-graph-day-L1-bg: #4A3418 !important;
            }
          filename: metrics.svg
          committer_message: "chore: update metrics [skip ci]"


  update-waka:
    runs-on: ubuntu-latest
    needs: update-activity
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update WakaTime stats
        uses: matchai/waka-readme-stats@v3
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_LINES_OF_CODE: 'true'
          SHOW_PROJECTS: 'true'
