<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;display=swap');
      
      .bg { fill: #0D0A07; }
      .border { stroke: #E8A33D; stroke-width: 2; fill: none; }
      .terminal-header { fill: #15110D; }
      
      .text-amber { fill: #E8A33D; font-family: 'Fira Code', monospace; }
      .text-light { fill: #F5EFE6; font-family: 'Fira Code', monospace; }
      .text-dim { fill: #A5927B; font-family: 'Fira Code', monospace; }
      
      .title { font-size: 24px; font-weight: 700; }
      .subtitle { font-size: 14px; font-weight: 500; }
      .body { font-size: 13px; font-weight: 400; }
      .small { font-size: 11px; font-weight: 400; }
      
      .bar-bg { fill: #15110D; rx: 4; }
      .bar-fill { fill: #E8A33D; rx: 4; }
      
      .decoder-anim {
        animation: glitch 3s infinite;
      }
      @keyframes glitch {
        0% { opacity: 1; transform: translate(0, 0); }
        2% { opacity: 0.8; transform: translate(-2px, 1px); }
        4% { opacity: 1; transform: translate(2px, -1px); }
        6% { opacity: 0.9; transform: translate(0, 0); }
        100% { opacity: 1; transform: translate(0, 0); }
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg border" x="1" y="1" width="798" height="458" rx="8" />
  
  <!-- Terminal Header -->
  <path class="terminal-header border" d="M 1 9 Q 1 1 9 1 L 791 1 Q 799 1 799 9 L 799 35 L 1 35 Z" />
  <circle cx="20" cy="18" r="6" fill="#FF5F56" />
  <circle cx="40" cy="18" r="6" fill="#FFBD2E" />
  <circle cx="60" cy="18" r="6" fill="#27C93F" />
  <text x="400" y="23" class="text-amber body" text-anchor="middle">chitrangi@nexus: ~</text>

  <!-- Content Grid -->
  <g transform="translate(30, 70)">
    
    <!-- LEFT COLUMN -->
    <!-- Profile Info -->
    <g class="decoder-anim">
      <text x="0" y="0" class="text-amber title">Chitrangi Bhatnagar</text>
      <text x="0" y="22" class="text-light subtitle">&gt; AI Engineer &amp; ML Practitioner</text>
    </g>
    
    <!-- Location & Edu -->
    <text x="0" y="60" class="text-dim body">[LOC]</text>
    <text x="50" y="60" class="text-light body">Bengaluru, India</text>
    
    <text x="0" y="85" class="text-dim body">[EDU]</text>
    <text x="50" y="85" class="text-light body">B.Tech CS (AI &amp; ML)</text>
    <text x="50" y="105" class="text-light body">Presidency University</text>
    
    <text x="0" y="130" class="text-dim body">[GPA]</text>
    <text x="50" y="130" class="text-amber" font-weight="700">8.54</text>

    <!-- Experience & AI Domains -->
    <g transform="translate(0, 180)">
      <text x="0" y="0" class="text-amber subtitle">[ System Stats ]</text>
      
      <text x="0" y="25" class="text-dim body">Experience:</text>
      <text x="90" y="25" class="text-light body">3 internships, 5+ AI systems</text>
      
      <text x="0" y="50" class="text-dim body">Domains:</text>
      <text x="90" y="50" class="text-light body">RAG Pipelines, LLM Orchestration,</text>
      <text x="90" y="70" class="text-light body">Full-Stack Development</text>
      
      <text x="0" y="95" class="text-dim body">Status:</text>
      <text x="90" y="95" class="text-light body">Open to Opportunities</text>
    </g>
    
    <!-- RIGHT COLUMN -->
    <g transform="translate(420, 0)">
      
      <!-- Skills -->
      <text x="0" y="0" class="text-amber subtitle">[ Competencies ]</text>
      
      <g transform="translate(0, 20)">
        <text x="0" y="12" class="text-light body">Python / AI / ML</text>
        <rect x="150" y="3" width="180" height="10" class="bar-bg" />
        <rect x="150" y="3" width="160" height="10" class="bar-fill" filter="url(#glow)" />
      </g>
      
      <g transform="translate(0, 45)">
        <text x="0" y="12" class="text-light body">LangChain / RAG</text>
        <rect x="150" y="3" width="180" height="10" class="bar-bg" />
        <rect x="150" y="3" width="140" height="10" class="bar-fill" filter="url(#glow)" />
      </g>
      
      <g transform="translate(0, 70)">
        <text x="0" y="12" class="text-light body">React / Next.js</text>
        <rect x="150" y="3" width="180" height="10" class="bar-bg" />
        <rect x="150" y="3" width="130" height="10" class="bar-fill" filter="url(#glow)" />
      </g>
      
      <g transform="translate(0, 95)">
        <text x="0" y="12" class="text-light body">Backend(FastAPI)</text>
        <rect x="150" y="3" width="180" height="10" class="bar-bg" />
        <rect x="150" y="3" width="150" height="10" class="bar-fill" filter="url(#glow)" />
      </g>
      
      <g transform="translate(0, 120)">
        <text x="0" y="12" class="text-light body">Cloud / DevOps</text>
        <rect x="150" y="3" width="180" height="10" class="bar-bg" />
        <rect x="150" y="3" width="120" height="10" class="bar-fill" filter="url(#glow)" />
      </g>

      <!-- Awards -->
      <g transform="translate(0, 180)">
        <text x="0" y="0" class="text-amber subtitle">[ Achievements ]</text>
        
        <text x="0" y="25" class="text-dim body">[AWARD]</text>
        <text x="60" y="25" class="text-light body">Best Societal Project</text>
        <text x="60" y="45" class="text-dim small">Aadhaar-enabled biometric missing persons tracker</text>
        
        <text x="0" y="70" class="text-dim body">[AWARD]</text>
        <text x="60" y="70" class="text-light body">Hackathon Finalist</text>
        <text x="60" y="90" class="text-dim small">Genesys 2025 · Led AI cybersecurity team</text>
        
        <text x="0" y="115" class="text-dim body">[AWARD]</text>
        <text x="60" y="115" class="text-light body">Bengaluru Eco Summit</text>
        <text x="60" y="135" class="text-dim small">1st Prize · Farming-tech innovation</text>
      </g>
      
    </g>
  </g>
  
  <!-- Current Focus Footer -->
  <g transform="translate(30, 420)">
    <text x="0" y="0" class="text-amber body">&gt; executing current_focus.sh:</text>
    <g class="decoder-anim">
      <text x="240" y="0" class="text-light body">model evaluation · feature engineering · deployment patterns</text>
    </g>
  </g>
  
</svg>
